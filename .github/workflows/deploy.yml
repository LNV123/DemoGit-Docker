name: CI/CD Docker

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Java
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Build project
    - name: Build JAR
      run: mvn clean package -DskipTests

    # 4. Login Docker Hub
    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. Build Docker
    - name: Build Docker Image
      run: docker build -t ngocvux/profile-website:latest .

    # 6. Push Docker
    - name: Push Docker Image
      run: docker push ngocvux/profile-website:latest

    # 7. Deploy
    - name: Triển khai lên DevOps Classroom
      run: |
        REPO="ngocvux/profile-website"
        CONTAINER_PORT=8081

        RESPONSE=$(curl -sS -m 60 -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=4&container_port=$CONTAINER_PORT&strict_container_port=0")

        BODY=$(echo "$RESPONSE" | sed "$d")
        CODE=$(echo "$RESPONSE" | tail -n1)

        echo "Webhook HTTP: $CODE"

        echo "::group::Chi tiết webhook JSON"
        echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
        echo "::endgroup::"

        if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
          echo "❌ Deploy thất bại!"
          exit 1
        fi

        echo "✅ Deploy thành công!"
